name: Update

on:
  label:
    types:
      - created # for test
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
      - cron: '30 16 * * *' # 00:30 Beijing time (16:30 UTC)
  watch:
    types: [started]

permissions:
  contents: write
  issues: write 

jobs:
  update_daily_papers:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Update papers
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        AI_SUMMARY_TOP_N: "5"
        AI_FULLTEXT: "1"
      run: |
        python main.py

    - name: Commit and push changes
      uses: github-actions-x/commit@v2.9
      with:
        github-token: ${{ secrets.PERSONAL_TOKEN }}
        push-branch: 'main'
        commit-message: '✏️ Update papers automatically.'
        force-add: 'true'
        files: README.md .github/ISSUE_TEMPLATE.md papers/ index.html summaries/
        name: HongkunLuo
        email: luohongkun0715@gmail.com

    - name: Deploy to GitHub Pages
      run: |
        mkdir -p /tmp/gh-pages-deploy
        cp index.html /tmp/gh-pages-deploy/
        cp -r papers /tmp/gh-pages-deploy/ 2>/dev/null || true
        cp -r summaries /tmp/gh-pages-deploy/ 2>/dev/null || true
        touch /tmp/gh-pages-deploy/.nojekyll
    - name: Publish to gh-pages branch
      uses: peaceiris/actions-gh-pages@v4
      with:
        github_token: ${{ secrets.PERSONAL_TOKEN }}
        publish_dir: /tmp/gh-pages-deploy
        publish_branch: gh-pages
        force_orphan: true
        enable_jekyll: false

    - name: Create an issue to notify
      uses: JasonEtco/create-an-issue@v2
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_TOKEN}}
